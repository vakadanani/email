<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — SpamShield AI</title>
    <meta name="description" content="Create your SpamShield AI account to start detecting spam and phishing emails.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Animated background -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="app-wrapper">

        <!-- Header / Brand -->
        <header class="header" id="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="brand">SpamShield</span>
                    <span class="badge">AI Model</span>
                </div>
            </div>
        </header>

        <!-- Register Card -->
        <div class="main-card auth-card">
            <div class="card-header">
                <div class="auth-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </div>
                <h1>Create <span class="gradient-text">Account</span></h1>
                <p class="subtitle">Join SpamShield AI and start protecting your inbox with advanced threat detection.</p>
            </div>

            <!-- Error Message -->
            <div class="auth-message error-message" id="errorMsg" style="display: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <span id="errorText"></span>
            </div>

            <!-- Success Message -->
            <div class="auth-message success-message" id="successMsg" style="display: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span id="successText"></span>
            </div>

            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="regUsername">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Username
                    </label>
                    <input type="text" id="regUsername" class="form-input" placeholder="Choose a username" required minlength="3" autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="regEmail">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        Email Address
                    </label>
                    <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="regPassword">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Password
                    </label>
                    <input type="password" id="regPassword" class="form-input" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label class="form-label" for="regConfirm">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                        Confirm Password
                    </label>
                    <input type="password" id="regConfirm" class="form-input" placeholder="Confirm your password" required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="auth-btn register-btn" id="registerBtn">
                    <span class="btn-content">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                        <span>Create Account</span>
                    </span>
                    <span class="btn-loading">
                        <span class="spinner"></span>
                        <span>Creating account…</span>
                    </span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login" class="auth-link">Sign In</a></p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by <strong>TF-IDF</strong> + <strong>Multinomial Naive Bayes</strong> · Hybrid Detection ·
                Explainable AI · Phishing Guard</p>
        </footer>

    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const successMsg = document.getElementById('successMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            // Client-side validation
            if (password !== confirm) {
                errorMsg.style.display = 'flex';
                errorText.textContent = 'Passwords do not match.';
                return;
            }

            btn.classList.add('loading');

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, confirm_password: confirm })
                });
                const data = await res.json();
                btn.classList.remove('loading');

                if (data.success) {
                    successMsg.style.display = 'flex';
                    document.getElementById('successText').textContent = `Account created! Welcome, ${data.username}! Redirecting…`;
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    errorMsg.style.display = 'flex';
                    errorText.textContent = data.error || 'Registration failed. Please try again.';
                }
            } catch (err) {
                btn.classList.remove('loading');
                errorMsg.style.display = 'flex';
                errorText.textContent = 'Network error. Is the server running?';
            }
        }
    </script>

</body>

</html>
